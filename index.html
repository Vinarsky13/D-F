<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Discipline Equals Freedom</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f7f7f7;
      --dim: #bdbdbd;
      --red: #d0001d;
      --font: "Courier New", "SF Mono", Menlo, Consolas, monospace;
      --radius: 22px;
      --motion-duration: 10s;
      --mark-width: min(92vw, 430px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .widget {
      width: min(100%, 680px);
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: clamp(22px, 7vmin, 56px);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .mark {
      width: var(--mark-width);
      max-width: 100%;
      display: grid;
      justify-items: center;
      gap: clamp(10px, 3vmin, 16px);
      text-align: center;
      user-select: none;
    }

    .line {
      width: 38%;
      height: 2px;
      background: var(--red);
    }

    .text {
      width: 100%;
      min-width: 0;
      display: grid;
      gap: clamp(6px, 2vmin, 10px);
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--text);
    }

    .shine {
      position: relative;
      display: block;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-align: center;
      letter-spacing: clamp(0.06em, 1.8vw, 0.16em);
      color: var(--text);
      animation: settle var(--motion-duration) cubic-bezier(0.22, 1, 0.36, 1) infinite;
      will-change: transform, opacity, filter;
    }

    .shine:nth-child(2) {
      animation-delay: 120ms;
    }

    .shine:nth-child(3) {
      animation-delay: 240ms;
    }

    .text__small {
      font-size: clamp(21px, 6.2vmin, 38px);
      font-weight: 600;
    }

    .text__large {
      font-size: clamp(36px, 10vmin, 66px);
      font-weight: 500;
      letter-spacing: clamp(0.08em, 2vw, 0.17em);
    }

    @keyframes settle {
      0%,
      70%,
      100% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(0) scale(1);
      }

      76% {
        opacity: 0.35;
        filter: blur(1.6px);
        transform: translateX(-18px) scale(0.97);
      }

      86% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(8px) scale(1.02);
      }

      93% {
        transform: translateX(-3px) scale(0.995);
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 10px;
      }

      .widget {
        min-height: 240px;
        padding: 20px 14px;
      }

      .mark {
        width: min(94vw, 340px);
      }

      .line {
        width: 42%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .shine {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Discipline equals freedom">
    <section class="mark">
      <div class="line" aria-hidden="true"></div>

      <div class="text">
        <span class="shine text__small">Discipline</span>
        <span class="shine text__large">Equals</span>
        <span class="shine text__large">Freedom</span>
      </div>

      <div class="line" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
