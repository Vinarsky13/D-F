<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Discipline Equals Freedom</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f7f7f7;
      --dim: #bdbdbd;
      --red: #d0001d;
      --font: "Courier New", "SF Mono", Menlo, Consolas, monospace;
      --radius: 22px;
      --shine-duration: 10s;
      --mark-width: min(92vw, 430px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .widget {
      width: min(100%, 680px);
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: clamp(22px, 7vmin, 56px);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .mark {
      width: var(--mark-width);
      max-width: 100%;
      display: grid;
      justify-items: center;
      gap: clamp(10px, 3vmin, 16px);
      text-align: center;
      user-select: none;
    }

    .line {
      width: 38%;
      height: 2px;
      background: var(--red);
    }

    .text {
      width: 100%;
      min-width: 0;
      display: grid;
      gap: clamp(6px, 2vmin, 10px);
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--text);
    }

    .shine {
      position: relative;
      display: block;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-align: center;
      letter-spacing: clamp(0.06em, 1.8vw, 0.16em);
      color: var(--text);
    }

    .shine::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: transparent;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 40%,
        #ffffff 48%,
        #ffffff 52%,
        transparent 60%,
        transparent 100%
      );
      background-size: 240% 100%;
      background-position: 140% 0;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: occasionalShine var(--shine-duration) cubic-bezier(0.22, 1, 0.36, 1) infinite;
      pointer-events: none;
    }

    .shine:nth-child(2)::after {
      animation-delay: 120ms;
    }

    .shine:nth-child(3)::after {
      animation-delay: 240ms;
    }

    .text__small {
      font-size: clamp(21px, 6.2vmin, 38px);
      font-weight: 600;
    }

    .text__large {
      font-size: clamp(36px, 10vmin, 66px);
      font-weight: 500;
      letter-spacing: clamp(0.08em, 2vw, 0.17em);
    }

    @keyframes occasionalShine {
      0%,
      74% {
        opacity: 0;
        background-position: 140% 0;
      }

      78% {
        opacity: 0.9;
      }

      100% {
        opacity: 0;
        background-position: -140% 0;
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 10px;
      }

      .widget {
        min-height: 240px;
        padding: 20px 14px;
      }

      .mark {
        width: min(94vw, 340px);
      }

      .line {
        width: 42%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .shine::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Discipline equals freedom">
    <section class="mark">
      <div class="line" aria-hidden="true"></div>

      <div class="text">
        <span class="shine text__small" data-text="Discipline">Discipline</span>
        <span class="shine text__large" data-text="Equals">Equals</span>
        <span class="shine text__large" data-text="Freedom">Freedom</span>
      </div>

      <div class="line" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
